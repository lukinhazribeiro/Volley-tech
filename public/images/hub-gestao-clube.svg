<svg xmlns="http://www.w3.org/2000/svg" width="768" height="512" viewBox="0 0 768 512" fill="none" role="img" aria-label="Dashboard de gestão de clube">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="768" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#141821"/>
      <stop offset="1" stop-color="#0b0d12"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff7a1a"/>
      <stop offset="1" stop-color="#f7541e"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#ff7a1a" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ff7a1a"/>
    </linearGradient>
  </defs>

  <rect width="768" height="512" fill="url(#bg)"/>

  <!-- glow -->
  <circle cx="620" cy="120" r="180" fill="#ff7a1a" opacity="0.10"/>

  <!-- header -->
  <rect x="48" y="44" width="220" height="18" rx="9" fill="#ffffff" opacity="0.85"/>
  <rect x="48" y="72" width="140" height="12" rx="6" fill="#ffffff" opacity="0.35"/>

  <!-- KPI cards -->
  <g>
    <rect x="48" y="110" width="200" height="96" rx="16" fill="#1b202b" stroke="#2a3140" stroke-width="1.5"/>
    <rect x="66" y="128" width="70" height="10" rx="5" fill="#8b94a7"/>
    <text x="66" y="180" font-family="Arial, sans-serif" font-size="34" font-weight="800" fill="#ffffff">128</text>
    <rect x="150" y="128" width="40" height="40" rx="20" fill="#ff7a1a" opacity="0.15"/>
    <path d="M170 140a10 10 0 100 20 10 10 0 000-20zm-18 40c0-9 8-14 18-14s18 5 18 14" stroke="url(#orange)" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
  <g>
    <rect x="264" y="110" width="200" height="96" rx="16" fill="#1b202b" stroke="#2a3140" stroke-width="1.5"/>
    <rect x="282" y="128" width="90" height="10" rx="5" fill="#8b94a7"/>
    <text x="282" y="180" font-family="Arial, sans-serif" font-size="30" font-weight="800" fill="#3ddc84">R$ 24k</text>
  </g>
  <g>
    <rect x="480" y="110" width="200" height="96" rx="16" fill="#1b202b" stroke="#2a3140" stroke-width="1.5"/>
    <rect x="498" y="128" width="80" height="10" rx="5" fill="#8b94a7"/>
    <text x="498" y="180" font-family="Arial, sans-serif" font-size="30" font-weight="800" fill="#ff5a4d">6 atraso</text>
  </g>

  <!-- athletes list -->
  <rect x="48" y="230" width="380" height="234" rx="18" fill="#1b202b" stroke="#2a3140" stroke-width="1.5"/>
  <rect x="70" y="252" width="120" height="12" rx="6" fill="#ffffff" opacity="0.8"/>
  <g font-family="Arial, sans-serif">
    <!-- rows -->
    <g>
      <circle cx="86" cy="300" r="14" fill="#ff7a1a" opacity="0.2"/>
      <rect x="112" y="292" width="150" height="9" rx="4.5" fill="#ffffff" opacity="0.6"/>
      <rect x="112" y="306" width="90" height="8" rx="4" fill="#ffffff" opacity="0.25"/>
      <rect x="340" y="292" width="66" height="22" rx="11" fill="#3ddc84" opacity="0.18"/>
      <text x="373" y="308" font-size="12" font-weight="700" fill="#3ddc84" text-anchor="middle">Pago</text>
    </g>
    <g>
      <circle cx="86" cy="344" r="14" fill="#ff7a1a" opacity="0.2"/>
      <rect x="112" y="336" width="170" height="9" rx="4.5" fill="#ffffff" opacity="0.6"/>
      <rect x="112" y="350" width="80" height="8" rx="4" fill="#ffffff" opacity="0.25"/>
      <rect x="340" y="336" width="66" height="22" rx="11" fill="#ff5a4d" opacity="0.2"/>
      <text x="373" y="352" font-size="12" font-weight="700" fill="#ff5a4d" text-anchor="middle">Atraso</text>
    </g>
    <g>
      <circle cx="86" cy="388" r="14" fill="#ff7a1a" opacity="0.2"/>
      <rect x="112" y="380" width="140" height="9" rx="4.5" fill="#ffffff" opacity="0.6"/>
      <rect x="112" y="394" width="100" height="8" rx="4" fill="#ffffff" opacity="0.25"/>
      <rect x="340" y="380" width="66" height="22" rx="11" fill="#ffb020" opacity="0.2"/>
      <text x="373" y="396" font-size="11" font-weight="700" fill="#ffb020" text-anchor="middle">Pend.</text>
    </g>
    <g>
      <circle cx="86" cy="432" r="14" fill="#ff7a1a" opacity="0.2"/>
      <rect x="112" y="424" width="160" height="9" rx="4.5" fill="#ffffff" opacity="0.6"/>
      <rect x="112" y="438" width="70" height="8" rx="4" fill="#ffffff" opacity="0.25"/>
      <rect x="340" y="424" width="66" height="22" rx="11" fill="#3ddc84" opacity="0.18"/>
      <text x="373" y="440" font-size="12" font-weight="700" fill="#3ddc84" text-anchor="middle">Pago</text>
    </g>
  </g>

  <!-- revenue chart -->
  <rect x="444" y="230" width="236" height="234" rx="18" fill="#1b202b" stroke="#2a3140" stroke-width="1.5"/>
  <rect x="466" y="252" width="120" height="12" rx="6" fill="#ffffff" opacity="0.8"/>
  <g>
    <rect x="470" y="380" width="30" height="52" rx="6" fill="url(#bar)"/>
    <rect x="512" y="352" width="30" height="80" rx="6" fill="url(#bar)"/>
    <rect x="554" y="326" width="30" height="106" rx="6" fill="url(#bar)"/>
    <rect x="596" y="360" width="30" height="72" rx="6" fill="url(#bar)"/>
    <rect x="638" y="300" width="30" height="132" rx="6" fill="url(#bar)"/>
  </g>
  <polyline points="485,372 527,344 569,318 611,352 653,292" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
  <circle cx="653" cy="292" r="5" fill="#ff7a1a"/>
</svg>
